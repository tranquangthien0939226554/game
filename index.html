<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🥿 Ném Dép Ông Bán Cháo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Baloo 2',cursive;touch-action:none;user-select:none;}
#W{position:relative;width:100%;height:100%;max-width:430px;margin:0 auto;overflow:hidden;}
/* ── NỀN: bầu trời trên, vỉa hè dưới ── */
#bg{position:absolute;inset:0;background:linear-gradient(180deg,#87CEEB 0%,#b8e0f5 40%,#b8e0f5 40%,#c8b898 100%);}
/* Vỉa hè gạch — chiếm nửa dưới, nơi người chơi đứng */
#tiles{position:absolute;bottom:0;left:0;right:0;height:52%;background-color:#c8aa72;background-image:repeating-linear-gradient(90deg,rgba(0,0,0,.07) 0 1px,transparent 1px 52px),repeating-linear-gradient(0deg,rgba(0,0,0,.07) 0 1px,transparent 1px 52px);}
/* Đường ngang — dải giữa màn hình */
#road{position:absolute;bottom:46%;left:0;right:0;height:14%;background:linear-gradient(180deg,#4a4a4a,#606060);z-index:4;}
#road-line{position:absolute;top:45%;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,#ffe066 0 36px,transparent 36px 72px);animation:roadAnim 0.5s linear infinite;}
#road-edge-top{position:absolute;top:0;left:0;right:0;height:3px;background:#888;}
#road-edge-bot{position:absolute;bottom:0;left:0;right:0;height:3px;background:#888;}
@keyframes roadAnim{from{background-position:0 0}to{background-position:-72px 0}}
/* Đường dọc — tạo ngã tư, phía phải màn hình */
#road-vert{position:absolute;right:18%;top:0;bottom:0;width:14%;background:#505050;z-index:3;}
#road-vert-line{position:absolute;left:45%;top:0;bottom:0;width:4px;background:repeating-linear-gradient(180deg,#ffe066 0 36px,transparent 36px 72px);animation:roadAnimV 0.5s linear infinite;}
#road-vert-edge-l{position:absolute;left:0;top:0;bottom:0;width:3px;background:#888;}
#road-vert-edge-r{position:absolute;right:0;top:0;bottom:0;width:3px;background:#888;}
@keyframes roadAnimV{from{background-position:0 0}to{background-position:0 72px}}
/* Góc ngã tư — che vạch kẻ chỗ giao nhau */
#intersection{position:absolute;right:18%;bottom:46%;width:14%;height:14%;background:#555;z-index:5;}
/* Nhà cửa nền phố */
#buildings{position:absolute;top:0;left:0;right:0;height:40%;display:flex;align-items:flex-end;overflow:hidden;}
.bld{flex-shrink:0;border-radius:3px 3px 0 0;position:relative;}
.bld-win{position:absolute;background:rgba(255,240,180,.7);border:1px solid rgba(0,0,0,.15);border-radius:2px;}
/* Cây vỉa hè — đứng ở mép đường, z thấp hơn ông */
.tree{position:absolute;bottom:58%;display:flex;flex-direction:column;align-items:center;z-index:5;}
.tree-top{background:radial-gradient(circle,#4a9e3f,#2d7a25);border-radius:50%;box-shadow:0 4px 8px rgba(0,0,0,.2);}
.tree-trunk{background:#8B5E3C;border-radius:2px;}
/* Xe máy chạy trên đường */
.moto-far{position:absolute;bottom:47%;font-size:clamp(16px,4vw,28px);opacity:.85;filter:drop-shadow(1px 1px 2px rgba(0,0,0,.3));z-index:8;}
#m1{left:-60px;animation:motoL 6s linear infinite;}
#m2{left:-60px;animation:motoL 10s linear infinite 3.5s;font-size:clamp(12px,3vw,20px);opacity:.6;}
@keyframes motoL{from{transform:translateX(-60px)}to{transform:translateX(110vw)}}
/* Bong bóng thoại */
#speech{position:absolute;z-index:50;background:#fff;border:2px solid #333;border-radius:12px;padding:6px 10px;font-size:clamp(9px,2.5vw,14px);font-weight:800;color:#333;white-space:nowrap;display:none;pointer-events:none;}
#speech::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#333;}
@keyframes tearDrop{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(40px)}}
#ong-group.laugh{animation:laughBounce 0.35s ease-in-out infinite;}
@keyframes laughBounce{0%,100%{transform:translateY(0) rotate(0)}40%{transform:translateY(-7px) rotate(-3deg)}70%{transform:translateY(-3px) rotate(3deg)}}


#player-girl{position:absolute;bottom:0;left:5%;width:clamp(55px,15vw,105px);z-index:24;pointer-events:none;}
#player-girl.throwing{animation:throwArm .3s ease-out;}
@keyframes throwArm{0%{transform:rotate(0)}50%{transform:rotate(-8deg) translateY(-4px)}100%{transform:rotate(0)}}
#hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:60;display:flex;gap:10px;align-items:center;background:rgba(0,0,0,.72);border-radius:40px;padding:6px 18px;backdrop-filter:blur(8px);border:1px solid rgba(255,210,50,.25);white-space:nowrap;}
.hi{text-align:center;color:#fff;font-size:clamp(10px,2.5vw,15px);font-weight:700;}
.hi b{display:block;font-size:clamp(15px,4vw,22px);color:#ffd700;line-height:1.1;}
.hs{width:1px;height:32px;background:rgba(255,210,50,.25);}
#dep-icons{position:absolute;bottom:clamp(36px,9vw,56px);left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:60;pointer-events:none;}
.di{font-size:clamp(16px,4.5vw,26px);transition:opacity .3s;filter:drop-shadow(1px 2px 3px rgba(0,0,0,.5));}
.di.used{opacity:.2;}
#pwr{position:absolute;bottom:clamp(56px,14vw,90px);left:50%;transform:translateX(-50%);z-index:60;display:none;flex-direction:column;align-items:center;gap:4px;}
#pwr-lbl{color:#fff;font-size:clamp(11px,3vw,16px);font-weight:800;text-shadow:0 2px 6px rgba(0,0,0,.8);}
#pwr-track{width:clamp(110px,30vw,200px);height:13px;background:rgba(0,0,0,.55);border-radius:20px;border:2px solid rgba(255,200,50,.5);overflow:hidden;}
#pwr-fill{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);border-radius:20px;transition:width .04s;}
#instr{position:absolute;bottom:clamp(12px,3.5vw,22px);left:50%;transform:translateX(-50%);z-index:60;font-size:clamp(10px,2.8vw,15px);font-weight:700;color:rgba(255,255,255,.92);text-shadow:1px 1px 4px rgba(0,0,0,.9);white-space:nowrap;pointer-events:none;}
#combo{position:absolute;top:clamp(52px,13vw,82px);left:50%;transform:translateX(-50%);z-index:60;font-size:clamp(16px,4.5vw,28px);font-weight:900;color:#fff;text-shadow:2px 2px 0 #8b1a00,-2px -2px 0 #8b1a00;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;}
.adt{position:absolute;border-radius:50%;background:rgba(255,255,100,.75);pointer-events:none;z-index:32;box-shadow:0 0 5px rgba(255,255,100,.5);}
.fdep{position:absolute;pointer-events:none;z-index:40;font-size:clamp(24px,6.5vw,42px);filter:drop-shadow(2px 3px 5px rgba(0,0,0,.55));transform-origin:center center;}
.spl{position:absolute;pointer-events:none;z-index:65;font-family:'Baloo 2',cursive;font-weight:900;text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000;animation:splUp .95s ease-out forwards;}
@keyframes splUp{0%{opacity:1;transform:translateY(0) scale(1)}55%{opacity:1;transform:translateY(-52px) scale(1.18)}100%{opacity:0;transform:translateY(-90px) scale(.75)}}
.ptcl{position:absolute;pointer-events:none;z-index:62;animation:ptFly .65s ease-out forwards;}
@keyframes ptFly{from{opacity:1;transform:translate(0,0) scale(1)}to{opacity:0;transform:var(--t) scale(.1)}}
#ov{position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.68);backdrop-filter:blur(10px);}
.ovb{background:linear-gradient(145deg,#fff9e8,#ffe880);border-radius:22px;padding:clamp(16px,5vw,32px) clamp(18px,6vw,44px);text-align:center;box-shadow:0 14px 44px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.7);max-width:86vw;border:3px solid #f59e0b;}
.ovb h1{font-size:clamp(20px,6vw,38px);color:#7a1a00;line-height:1.15;margin-bottom:4px;}
.ovb .sc{font-size:clamp(36px,10vw,62px);font-weight:900;color:#c2400c;line-height:1;margin:6px 0;}
.ovb .grd{font-size:clamp(13px,3.5vw,19px);font-weight:800;color:#7a1a00;margin-bottom:10px;}
.ovb p{font-size:clamp(11px,3vw,16px);color:#5a1a00;margin-bottom:14px;line-height:1.6;}
.btn{background:#7a1a00;color:#ffd700;border:none;border-radius:50px;padding:clamp(9px,2.5vw,15px) clamp(20px,7vw,44px);font-size:clamp(14px,4vw,21px);font-family:'Baloo 2',cursive;font-weight:900;cursor:pointer;letter-spacing:1px;box-shadow:0 5px 0 #4a0a00,0 7px 16px rgba(0,0,0,.4);transition:transform .12s,box-shadow .12s;touch-action:manipulation;margin:3px;}
.btn:active{transform:translateY(5px);box-shadow:0 0 0 #4a0a00;}
.btn-fb{background:linear-gradient(135deg,#1877f2,#0d5dbf);color:#fff;box-shadow:0 5px 0 #0a3d9e,0 7px 16px rgba(0,0,0,.4);}
</style>
</head>

<style>
#ong-group{position:absolute;bottom:44%;z-index:12;}
#ong-row{display:flex;align-items:flex-end;gap:4px;}
#cart-sign{position:absolute;top:-clamp(14px,4vw,20px);left:50%;transform:translateX(-50%);background:#d63031;color:#fff;font-size:clamp(5px,1.5vw,9px);font-weight:900;white-space:nowrap;padding:2px 5px;border-radius:3px;border:1px solid #900;z-index:13;}
#ong-group.bonk{animation:bonk .45s ease-out;}
@keyframes bonk{0%{transform:rotate(0) translateY(0)}25%{transform:rotate(-22deg) translateY(-6px) translateX(-5px)}65%{transform:rotate(14deg) translateY(-2px) translateX(3px)}100%{transform:rotate(0) translateY(0)}}
.c-top{width:115%;margin-left:-7%;height:clamp(14px,4vw,26px);background:linear-gradient(180deg,#e8e4d8,#ccc8b8);clip-path:polygon(3% 0,97% 0,91% 100%,9% 100%);border-top:3px solid #aaa;}
.c-body{background:linear-gradient(180deg,#bab6aa,#9a9690);border:2px solid #777;border-radius:5px 5px 2px 2px;padding:3px;position:relative;min-height:clamp(38px,11vw,80px);display:flex;align-items:center;justify-content:center;font-size:clamp(7px,2vw,12px);font-weight:800;color:#3a1a08;letter-spacing:.5px;}
.c-pot{position:absolute;top:-30%;left:14%;width:26%;height:38%;background:radial-gradient(circle at 30% 30%,#888,#333);border-radius:40% 40% 30% 30%;border:2px solid #222;}
.c-pot::after{content:'';position:absolute;top:-18%;left:22%;right:22%;height:18%;background:#444;border-radius:2px 2px 0 0;}
.c-wheels{display:flex;justify-content:space-between;padding:0 6%;margin-top:2px;}
.wheel{width:clamp(10px,3vw,18px);height:clamp(10px,3vw,18px);background:radial-gradient(circle at 35% 35%,#888,#111);border-radius:50%;border:2px solid #000;}
/* Bong bóng thoại TO, nổi bật */
#speech{
  position:absolute;z-index:70;
  background:#fff200;
  border:4px solid #c00;
  border-radius:16px;
  padding:10px 18px;
  font-size:clamp(16px,5vw,30px);
  font-weight:900;
  color:#c00;
  white-space:nowrap;
  display:none;
  pointer-events:none;
  text-shadow:1px 1px 0 #fff,-1px -1px 0 #fff;
  box-shadow:0 4px 18px rgba(200,0,0,.35);
  animation:speechPop .35s cubic-bezier(.36,2,.6,1) both;
}
@keyframes speechPop{from{transform:scale(0.3);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes speechShake{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(-3deg) scale(1.05)}75%{transform:rotate(3deg) scale(1.05)}}
#speech::after{content:'';position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:#c00;}
</style>

  <ellipse cx="45" cy="20" rx="16" ry="14" fill="#2a1408"/>
  <circle cx="52" cy="8" r="5" fill="#1a0e05"/>
  <rect x="39" y="36" width="12" height="14" rx="5" fill="#e0a870"/>
  <ellipse cx="45" cy="26" rx="17" ry="18" fill="#e0a870"/>
  <ellipse cx="45" cy="22" rx="16" ry="12" fill="#2a1408" opacity=".9"/>
  <ellipse cx="45" cy="30" rx="14" ry="15" fill="#e0a870"/>
  <path d="M18 48 Q45 58 72 48 L76 160 L14 160 Z" fill="#2255cc"/>
  <path d="M18 48 Q28 42 45 44 Q62 42 72 48 L68 55 Q55 50 45 52 Q35 50 22 55 Z" fill="#1a44b0"/>
  <path d="M37 44 Q45 48 53 44" stroke="#fff" stroke-width="2" fill="none"/>
  <path d="M18 55 Q5 75 8 100" stroke="#2255cc" stroke-width="12" fill="none" stroke-linecap="round"/>
  <g id="arm-up">
    <path d="M72 55 Q88 35 82 12" stroke="#2255cc" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M72 55 Q88 35 82 12" stroke="#e0a870" stroke-width="8" fill="none" stroke-linecap="round"/>
    <ellipse cx="80" cy="10" rx="8" ry="7" fill="#e0a870" transform="rotate(-20,80,10)"/>
    <ellipse cx="79" cy="20" rx="9" ry="4" fill="none" stroke="#d4a020" stroke-width="2.5" transform="rotate(-15,79,20)"/>
    <g transform="translate(58,-4) rotate(-50,30,10)">
      <ellipse cx="30" cy="12" rx="20" ry="9" fill="#8B5E3C"/>
      <ellipse cx="30" cy="12" rx="20" ry="9" fill="none" stroke="#5c3d1e" stroke-width="1.5"/>
      <path d="M18 9 Q30 4 42 9" stroke="#5c3d1e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M20 13 Q30 8 40 13" stroke="#7a4e2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M22 7 Q30 0 38 7" stroke="#6b4020" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  <path d="M25 150 Q22 170 20 180" stroke="#111" stroke-width="13" fill="none" stroke-linecap="round"/>
  <path d="M65 150 Q68 170 70 180" stroke="#111" stroke-width="13" fill="none" stroke-linecap="round"/>
</svg>
</div>
<div id="hud">
  <div class="hi">ĐIỂM<b id="sv">0</b></div>
  <div class="hs"></div>
  <div class="hi">DÉP<b id="dv">5</b></div>
  <div class="hs"></div>
  <div class="hi">TRÚNG<b id="hv">0</b></div>
</div>
<div id="combo"></div>
<div id="dep-icons">
  <div class="di" id="d0">🥿</div>
  <div class="di" id="d1">🥿</div>
  <div class="di" id="d2">🥿</div>
  <div class="di" id="d3">🥿</div>
  <div class="di" id="d4">🥿</div>
</div>
<div id="pwr">
  <div id="pwr-lbl">💪 LẤY ĐÀ...</div>
  <div id="pwr-track"><div id="pwr-fill"></div></div>
</div>
<div id="instr">👆 Nhấn &amp; giữ lấy đà — thả để ném dép!</div>
<div id="adc" style="position:absolute;inset:0;pointer-events:none;z-index:30;"></div>
<div id="ov">
  <div class="ovb" id="ovb">
    <h1>🥿 NÉM DÉP<br>ÔNG BÁN CHÁO</h1>
    <p style="margin-top:6px;margin-bottom:10px">
      Nhấn <b>giữ</b> để lấy đà 💪<br>
      <b>Thả</b> để ném dép vào ông! 🎯<br>
      <span style="color:#8b3000;font-size:.85em">Ông sẽ chạy qua lại cho khó hơn 😂</span>
    </p>
    <button class="btn" onclick="startGame()">▶ BẮT ĐẦU</button>
  </div>
</div>
</div>
<script>
let score=0,deps=5,hits=0,combo=0,maxCombo=0;
let active=false,pressing=false;
let px0=0,py0=0,power=0,pwrTimer=null;
let ongX=48,ongDir=1,ongSpeed=0.8,ongTimer=null;
let comboTimer=null;
const W=document.getElementById('W');
const ov=document.getElementById('ov');
const ovb=document.getElementById('ovb');
const ongGroup=document.getElementById('ong-group');
const speechEl=document.getElementById('speech');
const sv=document.getElementById('sv');
const dv=document.getElementById('dv');
const hv=document.getElementById('hv');
const pwrUI=document.getElementById('pwr');
const pwrFill=document.getElementById('pwr-fill');
const adc=document.getElementById('adc');
const comboEl=document.getElementById('combo');
const girl=document.getElementById('player-girl');
const zzz=document.getElementById('zzz');
const instr=document.getElementById('instr');

function setFace(mode){
  document.getElementById('eyes-sleep').style.display=mode==='sleep'?'':'none';
  document.getElementById('eyes-cry').style.display=mode==='cry'?'':'none';
  document.getElementById('eyes-laugh').style.display=mode==='laugh'?'':'none';
  document.getElementById('mouth-normal').style.display=mode==='sleep'?'':'none';
  document.getElementById('mouth-sad').style.display=mode==='cry'?'':'none';
  document.getElementById('mouth-laugh').style.display=mode==='laugh'?'':'none';
  zzz.setAttribute('opacity',mode==='sleep'?'0.8':'0');
}
function ongCenter(){
  const r=ongGroup.getBoundingClientRect();
  const wr=W.getBoundingClientRect();
  return{x:r.left-wr.left+r.width*.5,y:r.top-wr.top+r.height*.5};
}
function startOng(){
  ongX=48;ongDir=1;ongSpeed=0.7;
  ongGroup.style.transition='';
  ongGroup.style.transform='';
  ongGroup.classList.remove('laugh','bonk');
  setFace('sleep');
  speechEl.style.display='none';
  if(ongTimer)clearInterval(ongTimer);
  ongTimer=setInterval(()=>{
    if(!active)return;
    ongX+=ongDir*ongSpeed*(0.7+Math.random()*0.6);
    if(ongX>65){ongDir=-1;ongSpeed=0.6+Math.random()*0.8;}
    if(ongX<18){ongDir=1;ongSpeed=0.6+Math.random()*0.8;}
    ongGroup.style.left=ongX+'%';
    ongGroup.style.bottom=(44+Math.sin(Date.now()/700)*0.6)+'%';
  },40);
}
function startGame(){
  score=0;deps=5;hits=0;combo=0;maxCombo=0;
  sv.textContent='0';dv.textContent='5';hv.textContent='0';
  updateIcons();
  ov.style.display='none';
  active=true;
  instr.style.display='block';
  startOng();
}
function updateIcons(){
  for(let i=0;i<5;i++)document.getElementById('d'+i).classList.toggle('used',i>=deps);
}
function pos(e){
  if(e.changedTouches&&e.changedTouches.length)return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  if(e.touches&&e.touches.length)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}
function toLocal(gx,gy){const r=W.getBoundingClientRect();return{x:gx-r.left,y:gy-r.top};}

W.addEventListener('mousedown',onDown);
W.addEventListener('touchstart',onDown,{passive:false});
W.addEventListener('mouseup',onUp);
W.addEventListener('touchend',onUp,{passive:false});
let pressT0=0;
function onDown(e){
  if(!active||deps<=0)return;
  e.preventDefault();
  if(pressing)return;
  const p=pos(e),lp=toLocal(p.x,p.y);
  pressing=true;power=0;pressT0=Date.now();
  px0=lp.x;py0=lp.y;
  pwrUI.style.display='flex';
  pwrFill.style.width='0%';
  if(pwrTimer)clearInterval(pwrTimer);
  pwrTimer=setInterval(()=>{
    power=Math.min(100,(Date.now()-pressT0)/20);
    pwrFill.style.width=power+'%';
    const oc=ongCenter();
    drawAim(px0,py0,oc.x,oc.y);
  },30);
}
function onUp(e){
  if(!pressing||!active)return;
  e.preventDefault();
  pressing=false;
  clearInterval(pwrTimer);pwrTimer=null;
  pwrUI.style.display='none';
  clearAim();
  const finalPower=Math.max(20,power);
  deps=Math.max(0,deps-1);
  dv.textContent=deps;
  updateIcons();
  girl.classList.remove('throwing');
  void girl.offsetWidth;
  girl.classList.add('throwing');
  setTimeout(()=>girl.classList.remove('throwing'),350);
  throw_dep(px0,py0,finalPower);
}
function drawAim(sx,sy,tx,ty){
  adc.innerHTML='';
  const dx=tx-sx,dy=ty-sy,g=.32,N=20;
  for(let i=1;i<=N;i++){
    const t=i/N;
    const x=sx+dx*t,y=sy+dy*t+.5*g*(i*3)*(i*3);
    if(y>W.offsetHeight+20)break;
    const d=document.createElement('div');
    d.className='adt';
    const sz=Math.max(2.5,7.5-i*.22);
    d.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;opacity:${1-t*.55};transform:translate(-50%,-50%)`;
    adc.appendChild(d);
  }
}
function clearAim(){adc.innerHTML='';}
function throw_dep(sx,sy,pwr){
  const oc=ongCenter();
  const spread=(1-pwr/100)*95;
  const tx=oc.x+(Math.random()-.5)*spread;
  const ty=oc.y+(Math.random()-.5)*spread*.45;
  const dep=document.createElement('div');
  dep.className='fdep';dep.textContent='🥿';
  dep.style.left=sx+'px';dep.style.top=sy+'px';
  dep.style.transform='translate(-50%,-50%)';
  W.appendChild(dep);
  const dx=tx-sx,dy=ty-sy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const spd=4.5+pwr/18;
  const totalF=Math.max(15,dist/spd);
  const g=.30,rotSpd=(Math.random()>.5?1:-1)*(9+Math.random()*14);
  let f=0,rot=0,done=false;
  function step(){
    if(done)return;
    const t=f/totalF;
    const x=sx+dx*t,y=sy+dy*t+.5*g*f*f;
    rot+=rotSpd;
    dep.style.left=x+'px';dep.style.top=y+'px';
    dep.style.transform=`translate(-50%,-50%) rotate(${rot}deg)`;
    const or=ongGroup.getBoundingClientRect(),wr=W.getBoundingClientRect();
    const ox=or.left-wr.left,oy=or.top-wr.top;
    if(!done&&x>ox-18&&x<ox+or.width+18&&y>oy-12&&y<oy+or.height+18){
      done=true;dep.remove();onHit(x,y);checkEnd();return;
    }
    if(f>=totalF||y>W.offsetHeight+60){dep.remove();if(!done){done=true;onMiss(tx,ty);}checkEnd();return;}
    f++;requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
const HIT_TX=['TRÚNG RỒI! 🎯','ÔI ĐAU! 😱','HUYỀN THOẠI! 🏆','ĂN DÉP! 😂','TRỜI ƠI! 😲','DÉP BAY! 🔥'];
const MISS_TX=['HỤT RỒI 😅','TIẾC QUÁ! 😮','TRƯỢT! 💨','CẨN THẬN HƠN! 😆'];
function spawnTear(x,y){
  const t=document.createElement('div');t.className='tear';t.textContent='😢';
  t.style.cssText=`left:${x}px;top:${y}px;position:absolute;z-index:55;font-size:clamp(10px,3vw,18px);animation:tearDrop 0.7s ease-in forwards;`;
  W.appendChild(t);setTimeout(()=>t.remove(),800);
}
function onHit(x,y){
  hits++;combo++;
  if(combo>maxCombo)maxCombo=combo;
  const bonus=combo>=4?combo*25:combo>=3?combo*18:combo>=2?combo*12:10;
  score+=bonus;
  sv.textContent=score;hv.textContent=hits;
  ongGroup.classList.remove('bonk');void ongGroup.offsetWidth;ongGroup.classList.add('bonk');
  setTimeout(()=>ongGroup.classList.remove('bonk'),480);
  setFace('cry');
  spawnTear(x,y);
  setTimeout(()=>setFace('sleep'),1200);
  ongSpeed=Math.min(2.5,ongSpeed+0.2);
  spawnText(x,y,HIT_TX[Math.floor(Math.random()*HIT_TX.length)],'#ff2200',clampSz(20,5.5,36));
  spawnText(x,y-46,'+'+bonus,'#ffd700',clampSz(22,6,38));
  spawnParticles(x,y);
  if(combo>=2)showCombo(combo);
}
function onMiss(x,y){combo=0;hideCombo();spawnText(x,y,MISS_TX[Math.floor(Math.random()*MISS_TX.length)],'#fff',clampSz(15,4,26));}
function clampSz(b,vw,mx){return Math.min(mx,Math.max(b,window.innerWidth*vw/100));}
function spawnText(x,y,txt,col,sz){
  const el=document.createElement('div');
  el.className='spl';el.textContent=txt;
  el.style.cssText=`left:${x-80}px;top:${y-16}px;color:${col};font-size:${sz}px`;
  W.appendChild(el);setTimeout(()=>el.remove(),1000);
}
function spawnParticles(x,y){
  ['⭐','💥','✨','💫','🌟','🎯'].forEach((em,i)=>{
    const p=document.createElement('div');p.className='ptcl';p.textContent=em;
    const a=(i/6)*360*Math.PI/180,d=48+Math.random()*52;
    p.style.cssText=`left:${x-12}px;top:${y-12}px;--t:translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) scale(0)`;
    W.appendChild(p);setTimeout(()=>p.remove(),700);
  });
}
function showCombo(n){
  comboEl.textContent=`🔥 COMBO ×${n}${n>=5?' 🔥🔥':''}`;
  comboEl.style.opacity='1';
  comboEl.style.color=n>=4?'#ffd700':n>=3?'#ff8c00':'#fff';
  if(comboTimer)clearTimeout(comboTimer);
  comboTimer=setTimeout(hideCombo,1700);
}
function hideCombo(){comboEl.style.opacity='0';}
function checkEnd(){if(deps<=0)setTimeout(showEnd,700);}
function positionSpeech(){
  const gr=ongGroup.getBoundingClientRect(),wr=W.getBoundingClientRect();
  const gx=gr.left-wr.left+gr.width/2;
  const gy=gr.top-wr.top;
  speechEl.style.left=Math.max(4,Math.min(gx-speechEl.offsetWidth/2,W.offsetWidth-speechEl.offsetWidth-4))+'px';
  speechEl.style.top=Math.max(4,gy-speechEl.offsetHeight-18)+'px';
}
function showEnd(){
  active=false;
  clearInterval(ongTimer);
  const win=hits>=3;
  if(win){
    setFace('cry');
    let tc=0;
    const ti=setInterval(()=>{
      const gr=ongGroup.getBoundingClientRect(),wr=W.getBoundingClientRect();
      spawnTear(gr.left-wr.left+gr.width*.6,gr.top-wr.top+gr.height*.25);
      if(++tc>=5)clearInterval(ti);
    },280);
    setTimeout(()=>{
      ongGroup.style.transition='transform 1.8s ease-in';
      ongGroup.style.transform='translateX(-140vw)';
    },1500);
    setTimeout(()=>{
      const acc=Math.round(hits/5*100);
      const grades=[[100,'🏆 THIÊN TÀI NÉM DÉP!'],[80,'🥇 Cao thủ chính hiệu!'],[60,'🎯 Đỉnh lắm rồi!'],[40,'😄 Được được rồi!'],[20,'🥺 Tập thêm nha!'],[0,'😅 Trúng đúng 3 cái 😂']];
      const grade=grades.find(g=>acc>=g[0])[1];
      ovb.innerHTML=`<h1>🎉 THẮNG RỒI!</h1>
        <p style="font-size:clamp(12px,3.2vw,17px);margin:4px 0 6px">😭 Ông bán cháo khóc và đẩy xe chạy mất!</p>
        <div class="sc">${score}</div><div class="grd">${grade}</div>
        <p>✅ Trúng <b>${hits}/5</b> (${acc}%)<br>🔥 Combo: <b>${maxCombo}</b></p>
        <button class="btn" onclick="startGame()">🔄 CHƠI LẠI</button>`;
      ov.style.display='flex';
    },3400);
  } else {
    setFace('laugh');
    ongGroup.classList.add('laugh');
    setTimeout(()=>{
      speechEl.innerHTML='😤 VỈA HÈ NÀY CỦA TA! 😤';
      speechEl.style.display='block';
      speechEl.style.animation='speechPop .35s cubic-bezier(.36,2,.6,1) both, speechShake 0.5s ease-in-out 0.4s 3';
      positionSpeech();
    },300);
    setTimeout(()=>{
      ongGroup.classList.remove('laugh');
      speechEl.style.display='none';
      const acc=Math.round(hits/5*100);
      ovb.innerHTML=`<h1>😤 THUA RỒI!</h1>
        <p style="font-size:clamp(12px,3.2vw,17px);margin:4px 0 6px">Ông đứng cười:<br><b style="color:#c00">"Vỉa hè này của ta!"</b> 😤</p>
        <div class="sc">${score}</div>
        <p>✅ Trúng <b>${hits}/5</b> (${acc}%)<br>🔥 Combo: <b>${maxCombo}</b></p>
        <button class="btn" onclick="startGame()">🔄 THỬ LẠI</button>`;
      ov.style.display='flex';
    },3600);
  }
}
</script>
</body>
</html>
