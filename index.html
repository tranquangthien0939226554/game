<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏃‍♂️ ĐƯỜNG ĐUA VỈA HÈ: ÔNG BÁN CHÁO THÁO CHẠY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: 'Baloo 2', cursive;
            user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 450px;
            margin: 0 auto;
            background: #333;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #222;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 20px;
            border-radius: 30px;
            border: 2px solid #ff9f43;
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            white-space: nowrap;
            z-index: 10;
        }
        #hud span b {
            color: #ffff2e;
        }
        .screen {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            color: #fff;
        }
        .screen h1 {
            font-size: 26px;
            color: #ffd200;
            text-shadow: 0 4px 0 #c2400c;
            line-height: 1.2;
            margin-bottom: 10px;
        }
        .screen p {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 20px;
            max-width: 85%;
            line-height: 1.5;
        }
        .btn {
            background: linear-gradient(180deg, #ff9f43, #ee5253);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px 35px;
            font-size: 18px;
            font-family: 'Baloo 2', cursive;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 0 #a02020, 0 8px 15px rgba(0,0,0,0.4);
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #a02020;
        }
        #control-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            width: 90%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <span>KHOẢNG CÁCH: <b id="distance-val">0m</b></span>
        <span>ĐIỂM: <b id="score-val">0</b></span>
    </div>

    <div id="menu-screen" class="screen">
        <h1 id="menu-title">🏃‍♂️ ĐƯỜNG ĐUA VỈA HÈ<br>ÔNG BÁN CHÁO THÁO CHẠY</h1>
        <p id="menu-desc">Bản cập nhật sửa lỗi hiển thị đồ họa Vector 100% hình khối độc lập.</p>
        <button class="btn" id="start-btn" onclick="startGame()">▶ PHÓNG XE NGAY</button>
    </div>

    <div id="control-hint">💻 Phím Mũi tên Trái/Phải | 📱 Vuốt kéo trên màn hình</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hudDistance = document.getElementById('distance-val');
    const hudScore = document.getElementById('score-val');
    const menuScreen = document.getElementById('menu-screen');
    const menuTitle = document.getElementById('menu-title');
    const menuDesc = document.getElementById('menu-desc');
    const startBtn = document.getElementById('start-btn');

    let gameActive = false;
    let score = 0;
    let distanceTravelled = 0;
    let roadOffset = 0;

    let player, baTraiCay, otoBehind;
    let fruits = [];
    let items = [];
    let particles = [];
    let keys = {};
    let touchStartX = 0;

    const V_WIDTH = 400;
    const V_HEIGHT = 700;
    let scale = 1;

    function resizeCanvas() {
        const container = document.getElementById('game-container');
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
        scale = canvas.width / V_WIDTH;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Character {
        constructor(x, y, w, h, type) {
            this.x = x;
            this.y = y;
            this.w = w;
            this.h = h;
            this.type = type;
            this.targetX = x;
            this.speed = 6;
            this.carDanger = 100;
        }

        draw() {
            ctx.save();
            let rx = this.x * scale;
            let ry = this.y * scale;
            let rw = this.w * scale;
            let rh = this.h * scale;

            // Vẽ viền hộp kiểm tra lỗi để luôn nhìn thấy vị trí vật thể
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 1.5 * scale;
            ctx.strokeRect(rx - rw/2, ry - rh/2, rw, rh);

            // Khối nền bóng đổ
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.arc(rx, ry + rh/4, rw/2, 0, Math.PI*2);
            ctx.fill();

            if (this.type === 'player') {
                // XE ÔNG BÁN CHÁO: Khối vuông xanh lục lớn
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(rx - rw/2, ry - rh/2, rw, rh * 0.7);
                // Nồi cháo màu xám bạc
                ctx.fillStyle = '#e2e8f0';
                ctx.beginPath();
                ctx.arc(rx, ry - rh/6, rw/3, 0, Math.PI*2);
                ctx.fill();
                // Đầu nón lá màu cam vàng góc nhìn từ trên xuống
                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.arc(rx, ry + rh/3, rw/4, 0, Math.PI*2);
                ctx.fill();

            } else if (this.type === 'batraicay') {
                // BÀ TRÁI CÂY: Khối chữ nhật đỏ dọc
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(rx - rw/3, ry - rh/2, rw / 1.5, rh);
                // Sọt gánh trái cây màu nâu cam hai bên
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(rx - rw/2, ry + rh/8, rw, rh * 0.3);
                // Mũ bảo hiểm màu xanh dương
                ctx.fillStyle = '#3498db';
                ctx.beginPath();
                ctx.arc(rx, ry - rh/4, rw/3.5, 0, Math.PI*2);
                ctx.fill();

            } else if (this.type === 'oto') {
                // XE Ô TÔ CẢNH SÁT RƯỢT ĐUỔI: Khối xanh dương đậm siêu to
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(rx - rw/2, ry - rh/2, rw, rh);
                // Kính lái cabin màu trắng sữa
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(rx - rw/2.5, ry - rh/4, rw / 1.25, rh / 1.8);
                
                // Hiệu ứng đèn ưu tiên nháy chớp màu Đỏ / Xanh Dương
                let flash = Math.floor(Date.now() / 100) % 2 === 0;
                ctx.fillStyle = flash ? '#ef4444' : '#3b82f6';
                ctx.fillRect(rx - rw/3, ry - 3 * scale, rw/3, 6 * scale);
                ctx.fillStyle = flash ? '#3b82f6' : '#ef4444';
                ctx.fillRect(rx, ry - 3 * scale, rw/3, 6 * scale);
            }
            ctx.restore();
        }
    }

    function initGame() {
        score = 0;
        distanceTravelled = 0;
        fruits = [];
        items = [];
        particles = [];
        
        player = new Character(V_WIDTH / 2, V_HEIGHT - 160, 42, 50, 'player');
        baTraiCay = new Character(V_WIDTH / 2, 110, 42, 44, 'batraicay');
        baTraiCay.speed = 3.5;
        otoBehind = new Character(V_WIDTH / 2, V_HEIGHT - 45, 60, 80, 'oto');

        hudScore.textContent = '0';
        hudDistance.textContent = '0m';
    }

    let fruitSpawnTimer = 0;
    function handleFruitSpawning() {
        fruitSpawnTimer++;
        if (fruitSpawnTimer > 35) {
            fruitSpawnTimer = 0;
            let randType = Math.floor(Math.random() * 3);
            let colors = ['#22c55e', '#ef4444', '#eab308']; // Xanh quẩy, Đỏ hấu, Vàng chuối
            fruits.push({
                x: baTraiCay.x,
                y: baTraiCay.y + 15,
                r: 10,
                color: colors[randType],
                speedY: 5.5 + Math.random() * 2,
                speedX: (Math.random() - 0.5) * 2
            });
        }
    }

    let itemSpawnTimer = 0;
    function handleItemSpawning() {
        itemSpawnTimer++;
        if (itemSpawnTimer > 60) {
            itemSpawnTimer = 0;
            let lanes = [80, 140, 200, 260, 320];
            let targetLane = lanes[Math.floor(Math.random() * lanes.length)];
            let isGold = Math.random() > 0.45;
            items.push({
                x: targetLane,
                y: -20,
                r: 9,
                isGold: isGold,
                color: isGold ? '#fbbf24' : '#38bdf8',
                speedY: 4
            });
        }
    }

    function createParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 5,
                vy: (Math.random() - 0.5) * 5,
                size: Math.random() * 3 + 1.5,
                color: color,
                life: 20
            });
        }
    }

    function update() {
        if (!gameActive) return;

        distanceTravelled += 0.25;
        hudDistance.textContent = Math.floor(distanceTravelled) + 'm';
        
        roadOffset += 8;
        if (roadOffset >= 60) roadOffset = 0;

        if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
        if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

        if (player.x < 75) player.x = 75;
        if (player.x > 325) player.x = 325;

        // Xử lý AI lạng lách của Bà Trái Cây
        if (Math.abs(baTraiCay.x - baTraiCay.targetX) < 5) {
            let lanes = [90, 150, 200, 250, 310];
            baTraiCay.targetX = lanes[Math.floor(Math.random() * lanes.length)];
        }
        if (baTraiCay.x < baTraiCay.targetX) baTraiCay.x += baTraiCay.speed;
        if (baTraiCay.x > baTraiCay.targetX) baTraiCay.x -= baTraiCay.speed;

        // Trái cây bay cản đường
        handleFruitSpawning();
        for (let i = fruits.length - 1; i >= 0; i--) {
            let f = fruits[i];
            f.y += f.speedY;
            f.x += f.speedX;

            let pDistX = Math.abs(f.x - player.x);
            let pDistY = Math.abs(f.y - player.y);
            if (pDistX < (player.w/2 + f.r) && pDistY < (player.h/2 + f.r)) {
                player.carDanger -= 25;
                createParticles(f.x, f.y, f.color, 10);
                fruits.splice(i, 1);
                continue;
            }
            if (f.y > V_HEIGHT + 30) fruits.splice(i, 1);
        }

        // Nhặt đồng xu thưởng / Cháo nóng cứu nguy
        handleItemSpawning();
        for (let i = items.length - 1; i >= 0; i--) {
            let it = items[i];
            it.y += it.speedY;

            let pDistX = Math.abs(it.x - player.x);
            let pDistY = Math.abs(it.y - player.y);
            if (pDistX < (player.w/2 + it.r) && pDistY < (player.h/2 + it.r)) {
                if (!it.isGold) {
                    player.carDanger = Math.min(180, player.carDanger + 20);
                    score += 200;
                } else {
                    score += 400;
                }
                hudScore.textContent = score;
                createParticles(it.x, it.y, it.color, 8);
                items.splice(i, 1);
                continue;
            }
            if (it.y > V_HEIGHT + 30) items.splice(i, 1);
        }

        // Cập nhật hạt bụi
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life--;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // Tính khoảng cách rượt đuổi của ô tô cảnh sát
        player.carDanger -= 0.1;
        otoBehind.y = player.y + (160 - player.carDanger);
        otoBehind.x += (player.x - otoBehind.x) * 0.15;

        if (player.carDanger <= 0) {
            endGame();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Lòng đường chính xám đậm nhựa đường
        ctx.fillStyle = '#475569';
        ctx.fillRect(55 * scale, 0, 290 * scale, canvas.height);

        // Vỉa hè gạch hai bên lề màu đỏ cam đất
        ctx.fillStyle = '#ea580c';
        ctx.fillRect(0, 0, 55 * scale, canvas.height);
        ctx.fillRect(345 * scale, 0, 55 * scale, canvas.height);

        // Đường chỉ rãnh gạch vỉa hè
        ctx.fillStyle = '#9a3412';
        for (let y = roadOffset; y < V_HEIGHT; y += 40) {
            ctx.fillRect(0, y * scale, 55 * scale, 2 * scale);
            ctx.fillRect(345 * scale, y * scale, 55 * scale, 2 * scale);
        }

        // Vạch kẻ đứt phân chia làn đường màu trắng tinh
        ctx.fillStyle = '#ffffff';
        for (let y = roadOffset - 60; y < V_HEIGHT; y += 60) {
            ctx.fillRect(150 * scale, y * scale, 5 * scale, 30 * scale);
            ctx.fillRect(245 * scale, y * scale, 5 * scale, 30 * scale);
        }

        // Vẽ các Đồng xu / Bát cháo thưởng rơi xuống
        items.forEach(it => {
            ctx.fillStyle = it.color;
            ctx.beginPath();
            ctx.arc(it.x * scale, it.y * scale, it.r * scale, 0, Math.PI*2);
            ctx.fill();
        });

        // Vẽ Trái cây cản đường
        fruits.forEach(f => {
            ctx.fillStyle = f.color;
            ctx.beginPath();
            ctx.arc(f.x * scale, f.y * scale, f.r * scale, 0, Math.PI*2);
            ctx.fill();
        });

        // Đồ họa vẽ các Nhân vật
        if (otoBehind.y < V_HEIGHT + 100) otoBehind.draw();
        player.draw();
        baTraiCay.draw();

        // Vẽ hạt nổ
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x * scale, p.y * scale, p.size * scale, 0, Math.PI * 2);
            ctx.fill();
        });
        
        // Chữ văn bản gỡ lỗi trực tiếp để báo hiệu hệ thống đồ họa đang vẽ tốt
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = `${12 * scale}px Arial`;
        ctx.fillText("HỆ THỐNG ĐANG CHẠY MƯỢT MÀ", 65 * scale, V_HEIGHT * scale - 20);

        // Viền cảnh báo đỏ nguy cấp khi xe sát đuôi
        if (player && player.carDanger < 45) {
            ctx.save();
            let alertAlpha = Math.abs(Math.sin(Date.now() / 90)) * 0.4;
            ctx.strokeStyle = `rgba(239, 68, 68, ${alertAlpha})`;
            ctx.lineWidth = 12 * scale;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        initGame();
        gameActive = true;
        menuScreen.style.display = 'none';
    }

    function endGame() {
        gameActive = false;
        menuTitle.innerHTML = '💥 THUA RỒI! 🚔<br>XE CHÁO BỊ HÚC ĐỔ';
        menuDesc.innerHTML = `Bạn đã tháo chạy được quãng đường dài <b style="color:#ff9f43">${Math.floor(distanceTravelled)} mét</b> và đạt <b style="color:#ff9f43">${score} điểm</b>!`;
        startBtn.textContent = '🔄 CHƠI LẠI NGAY';
        menuScreen.style.display = 'flex';
    }

    // Lắng nghe tổ hợp phím và cảm ứng
    window.addEventListener('keydown', e => { keys[e.key] = true; });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    window.addEventListener('touchstart', e => {
        if (!gameActive) return;
        touchStartX = e.touches[0].clientX;
    }, { passive: true });

    window.addEventListener('touchmove', e => {
        if (!gameActive || !player) return;
        let touchX = e.touches[0].clientX;
        let diffX = touchX - touchStartX;
        player.x += diffX * 0.52;
        touchStartX = touchX;
    }, { passive: true });

    window.addEventListener('pointerdown', e => {
        if (!gameActive || !player) return;
        if (e.target.className === 'btn') return;
        let clickPercent = e.clientX / window.innerWidth;
        if (clickPercent < 0.38) player.x -= 24;
        else if (clickPercent > 0.62) player.x += 24;
    });

    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
