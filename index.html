<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏃‍♂️ ĐƯỜNG ĐUA VỈA HÈ: ÔNG BÁN CHÁO THÁO CHẠY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #222;
            font-family: 'Baloo 2', cursive;
            user-select: none;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 450px;
            margin: 0 auto;
            background: #444;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #333;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 20px;
            border-radius: 30px;
            border: 2px solid #ff9f43;
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            white-space: nowrap;
            z-index: 10;
        }
        #hud span b {
            color: #ffff2e;
        }
        .screen {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            color: #fff;
        }
        .screen h1 {
            font-size: 26px;
            color: #ffd200;
            text-shadow: 0 4px 0 #c2400c;
            line-height: 1.2;
            margin-bottom: 10px;
        }
        .screen p {
            font-size: 14px;
            color: #ddd;
            margin-bottom: 20px;
            max-width: 85%;
            line-height: 1.5;
        }
        .btn {
            background: linear-gradient(180deg, #ff9f43, #ee5253);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px 35px;
            font-size: 18px;
            font-family: 'Baloo 2', cursive;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 0 #a02020, 0 8px 15px rgba(0,0,0,0.4);
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #a02020;
        }
        #control-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            width: 90%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <span>KHOẢNG CÁCH: <b id="distance-val">0m</b></span>
        <span>ĐIỂM: <b id="score-val">0</b></span>
    </div>

    <div id="menu-screen" class="screen">
        <h1 id="menu-title">🏃‍♂️ ĐƯỜNG ĐUA VỈA HÈ<br>ÔNG BÁN CHÁO THÁO CHẠY</h1>
        <p id="menu-desc">Né tránh trái cây lạng lách từ phía trước! Chạy thoát khỏi xe ô tô đang rượt đuổi phía sau!</p>
        <button class="btn" id="start-btn" onclick="startGame()">▶ PHÓNG XE NGAY</button>
    </div>

    <div id="control-hint">💻 Phím Mũi tên Trái/Phải | 📱 Vuốt kéo trái/phải trên màn hình</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const hudDistance = document.getElementById('distance-val');
    const hudScore = document.getElementById('score-val');
    const menuScreen = document.getElementById('menu-screen');
    const menuTitle = document.getElementById('menu-title');
    const menuDesc = document.getElementById('menu-desc');
    const startBtn = document.getElementById('start-btn');

    let gameActive = false;
    let score = 0;
    let distanceTravelled = 0;
    let roadOffset = 0;

    let player, baTraiCay, otoBehind;
    let fruits = [];
    let items = [];
    let particles = [];
    let keys = {};
    let touchStartX = 0;

    const V_WIDTH = 400;
    const V_HEIGHT = 700;
    let scale = 1;

    function resizeCanvas() {
        const container = document.getElementById('game-container');
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
        scale = canvas.width / V_WIDTH;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Đối tượng nhân vật vẽ hoàn toàn bằng Canvas Shapes (Không dùng chữ Emoji)
    class Character {
        constructor(x, y, w, h, type) {
            this.x = x;
            this.y = y;
            this.w = w;
            this.h = h;
            this.type = type;
            this.targetX = x;
            this.speed = 5.5;
        }

        draw() {
            ctx.save();
            let rx = this.x * scale;
            let ry = this.y * scale;
            let rw = this.w * scale;
            let rh = this.h * scale;

            // Bóng đổ xe
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(rx, ry + rh/3, rw/1.2, rh/2, 0, 0, Math.PI*2);
            ctx.fill();

            if (this.type === 'player') {
                // ÔNG BÁN CHÁO VÀ XE ĐẨY CHÁO
                // Thân xe cháo (Khung vuông màu xanh lá mạ)
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(rx - rw/2, ry - rh/2, rw, rh * 0.7);
                // Nồi cháo màu bạc trên xe
                ctx.fillStyle = '#bdc3c7';
                ctx.beginPath();
                ctx.arc(rx, ry - rh/4, rw/3, 0, Math.PI*2);
                ctx.fill();
                // Nắp vung nồi cháo màu vàng nhạt
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(rx - rw/4, ry - rh/3, rw/2, 4 * scale);
                // Tay cầm đẩy xe phía sau
                ctx.strokeStyle = '#34495e';
                ctx.lineWidth = 3 * scale;
                ctx.strokeRect(rx - rw/2.2, ry + rh/5, rw * 0.9, rh * 0.2);
                
                // Đầu ông bán cháo nón lá góc nhìn từ trên xuống
                ctx.fillStyle = '#e67e22'; // Màu nón lá vàng nâu
                ctx.beginPath();
                ctx.arc(rx, ry + rh/3, rw/3.5, 0, Math.PI*2);
                ctx.fill();

            } else if (this.type === 'batraicay') {
                // BÀ BÁN TRÁI CÂY (Xe máy đỏ + sọt trái cây phía sau)
                // Thân xe máy dài màu đỏ
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(rx - rw/4, ry - rh/2, rw/2, rh);
                // Sọt hàng trái cây vuông màu vàng nâu
                ctx.fillStyle = '#d35400';
                ctx.fillRect(rx - rw/2, ry + rh/6, rw, rh * 0.35);
                // Trái cây lố nhố màu xanh trong sọt
                ctx.fillStyle = '#27ae60';
                ctx.beginPath();
                ctx.arc(rx - rw/4, ry + rh/4, 5 * scale, 0, Math.PI*2);
                ctx.arc(rx + rw/4, ry + rh/4, 5 * scale, 0, Math.PI*2);
                ctx.fill();
                // Đầu người lái xe đội mũ bảo hiểm xanh dương
                ctx.fillStyle = '#2980b9';
                ctx.beginPath();
                ctx.arc(rx, ry - rh/6, rw/3.5, 0, Math.PI*2);
                ctx.fill();

            } else if (this.type === 'oto') {
                // XE Ô TÔ CẢNH SÁT RƯỢT ĐUỔI
                // Thân xe ô tô hình chữ nhật bo góc lớn màu xanh đen thanh lịch
                ctx.fillStyle = '#1e3799';
                ctx.fillRect(rx - rw/2, ry - rh/2, rw, rh);
                // Nóc xe màu trắng
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(rx - rw/2.8, ry - rh/4, rw/1.4, rh/1.8);
                // Kính chắn gió trước/sau (Màu đen)
                ctx.fillStyle = '#2f3542';
                ctx.fillRect(rx - rw/3, ry - rh/3, rw/1.5, 6 * scale);
                ctx.fillRect(rx - rw/3, ry + rh/4, rw/1.5, 6 * scale);

                // Đèn còi hú nháy liên tục đỏ/xanh trên nóc
                let flash = Math.floor(Date.now() / 120) % 2 === 0;
                ctx.fillStyle = flash ? '#ff4757' : '#2f3542';
                ctx.fillRect(rx - rw/4, ry - 4*scale, rw/4, 8 * scale);
                ctx.fillStyle = flash ? '#2f3542' : '#54a0ff';
                ctx.fillRect(rx, ry - 4*scale, rw/4, 8 * scale);
            }

            ctx.restore();
        }
    }

    function initGame() {
        score = 0;
        distanceTravelled = 0;
        fruits = [];
        items = [];
        particles = [];
        
        player = new Character(V_WIDTH / 2, V_HEIGHT - 160, 42, 50, 'player');
        player.carDanger = 100;

        baTraiCay = new Character(V_WIDTH / 2, 110, 40, 44, 'batraicay');
        baTraiCay.speed = 3;
        
        otoBehind = new Character(V_WIDTH / 2, V_HEIGHT - 40, 60, 80, 'oto');

        hudScore.textContent = '0';
        hudDistance.textContent = '0m';
    }

    let fruitSpawnTimer = 0;
    function handleFruitSpawning() {
        fruitSpawnTimer++;
        if (fruitSpawnTimer > 40) {
            fruitSpawnTimer = 0;
            // Chọn ngẫu nhiên loại quả (0: Sầu riêng xanh khía, 1: Dưa hấu đỏ, 2: Chuối vàng)
            let typeIdx = Math.floor(Math.random() * 3);
            let colors = ['#27ae60', '#e74c3c', '#f1c40f'];
            fruits.push({
                x: baTraiCay.x,
                y: baTraiCay.y + 15,
                r: 11,
                color: colors[typeIdx],
                type: typeIdx,
                speedY: 5 + Math.random() * 2,
                speedX: (Math.random() - 0.5) * 2.5
            });
        }
    }

    let itemSpawnTimer = 0;
    function handleItemSpawning() {
        itemSpawnTimer++;
        if (itemSpawnTimer > 65) {
            itemSpawnTimer = 0;
            let lanes = [85, 140, 200, 260, 315];
            let targetLane = lanes[Math.floor(Math.random() * lanes.length)];
            let isGold = Math.random() > 0.4; // Vàng xu hoặc bát cháo
            items.push({
                x: targetLane,
                y: -20,
                r: 9,
                isGold: isGold,
                color: isGold ? '#f1c40f' : '#3498db',
                speedY: 4
            });
        }
    }

    function createParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                size: Math.random() * 3 + 2,
                color: color,
                life: 25
            });
        }
    }

    function update() {
        if (!gameActive) return;

        distanceTravelled += 0.22;
        hudDistance.textContent = Math.floor(distanceTravelled) + 'm';
        
        roadOffset += 7.5;
        if (roadOffset >= 60) roadOffset = 0;

        // Xử lý nút bấm điều khiển
        if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
        if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

        if (player.x < 75) player.x = 75;
        if (player.x > 325) player.x = 325;

        // Bà bán trái cây tự động lướt lạng lách thông minh
        if (Math.abs(baTraiCay.x - baTraiCay.targetX) < 6) {
            let lanes = [90, 150, 200, 250, 310];
            baTraiCay.targetX = lanes[Math.floor(Math.random() * lanes.length)];
        }
        if (baTraiCay.x < baTraiCay.targetX) baTraiCay.x += baTraiCay.speed;
        if (baTraiCay.x > baTraiCay.targetX) baTraiCay.x -= baTraiCay.speed;

        // Di chuyển trái cây cản đường
        handleFruitSpawning();
        for (let i = fruits.length - 1; i >= 0; i--) {
            let f = fruits[i];
            f.y += f.speedY;
            f.x += f.speedX;

            // Xử lý đâm trúng trái cây nguy hiểm
            let pDistX = Math.abs(f.x - player.x);
            let pDistY = Math.abs(f.y - player.y);
            if (pDistX < (player.w/2 + f.r) && pDistY < (player.h/2 + f.r)) {
                player.carDanger -= 25; // Bị thụt khoảng cách tụt lùi về phía sau
                createParticles(f.x, f.y, f.color, 12);
                fruits.splice(i, 1);
                continue;
            }

            if (f.y > V_HEIGHT + 30) fruits.splice(i, 1);
        }

        // Di chuyển và nhặt vật phẩm
        handleItemSpawning();
        for (let i = items.length - 1; i >= 0; i--) {
            let it = items[i];
            it.y += it.speedY;

            let pDistX = Math.abs(it.x - player.x);
            let pDistY = Math.abs(it.y - player.y);
            if (pDistX < (player.w/2 + it.r) && pDistY < (player.h/2 + it.r)) {
                if (!it.isGold) {
                    player.carDanger = Math.min(180, player.carDanger + 20); // Tăng tốc bứt phá
                    score += 150;
                } else {
                    score += 300; // Nhặt xu vàng
                }
                hudScore.textContent = score;
                createParticles(it.x, it.y, it.color, 10);
                items.splice(i, 1);
                continue;
            }

            if (it.y > V_HEIGHT + 30) items.splice(i, 1);
        }

        // Hạt bụi nổ tung
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            if (p.life <= 0) particles.splice(i, 1);
        }

        // Ô tô bám đuổi khốc liệt phía sau tiến dần lên theo thời gian
        player.carDanger -= 0.09;
        otoBehind.y = player.y + (160 - player.carDanger);
        otoBehind.x += (player.x - otoBehind.x) * 0.15;

        if (player.carDanger <= 0) {
            endGame();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Lòng đường chính màu xám đen nhựa
        ctx.fillStyle = '#4b5563';
        ctx.fillRect(55 * scale, 0, 290 * scale, canvas.height);

        // Vỉa hè hai bên lề đường màu cam gạch
        ctx.fillStyle = '#d97706';
        ctx.fillRect(0, 0, 55 * scale, canvas.height);
        ctx.fillRect(345 * scale, 0, 55 * scale, canvas.height);

        // Các đường vân vỉa hè gạch lề
        ctx.fillStyle = '#b45309';
        for (let y = roadOffset; y < V_HEIGHT; y += 40) {
            ctx.fillRect(0, y * scale, 55 * scale, 2 * scale);
            ctx.fillRect(345 * scale, y * scale, 55 * scale, 2 * scale);
        }

        // Các vạch đứt đoạn phân làn giao thông màu trắng
        ctx.fillStyle = '#ffffff';
        for (let y = roadOffset - 60; y < V_HEIGHT; y += 60) {
            ctx.fillRect(150 * scale, y * scale, 5 * scale, 30 * scale);
            ctx.fillRect(245 * scale, y * scale, 5 * scale, 30 * scale);
        }

        // Vẽ vật phẩm thưởng (Đồng xu vàng / Bát cháo xanh)
        items.forEach(it => {
            ctx.save();
            ctx.fillStyle = it.color;
            ctx.beginPath();
            ctx.arc(it.x * scale, it.y * scale, it.r * scale, 0, Math.PI*2);
            ctx.fill();
            // Vẽ viền sáng bóng cho đồng xu hoặc cháo
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5 * scale;
            ctx.stroke();
            ctx.restore();
        });

        // Vẽ chướng ngại vật Trái cây
        fruits.forEach(f => {
            ctx.save();
            ctx.fillStyle = f.color;
            ctx.beginPath();
            ctx.arc(f.x * scale, f.y * scale, f.r * scale, 0, Math.PI*2);
            ctx.fill();
            // Thêm một chấm đen nhỏ làm cuống trái cây để nhận diện đồ họa sinh động hơn
            ctx.fillStyle = '#000';
            ctx.fillRect((f.x - 2) * scale, (f.y - 2) * scale, 4 * scale, 4 * scale);
            ctx.restore();
        });

        // Vẽ 3 nhân vật cốt lõi bằng Vector hình khối
        if (otoBehind.y < V_HEIGHT + 80) otoBehind.draw();
        player.draw();
        baTraiCay.draw();

        // Vẽ các hiệu ứng nổ nhỏ vụn
        particles.forEach(p => {
            ctx.save();
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x * scale, p.y * scale, p.size * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
        
        // Nhấp nháy viền đỏ nguy hiểm cảnh báo ô tô sắp đâm đít
        if (player && player.carDanger < 45) {
            ctx.save();
            let alertAlpha = Math.abs(Math.sin(Date.now() / 100)) * 0.35;
            ctx.strokeStyle = `rgba(238, 82, 83, ${alertAlpha})`;
            ctx.lineWidth = 14 * scale;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        initGame();
        gameActive = true;
        menuScreen.style.display = 'none';
    }

    function endGame() {
        gameActive = false;
        menuTitle.innerHTML = '💥 THUA RỒI! 🚔<br>XE CHÁO BỊ HÚC ĐỔ';
        menuDesc.innerHTML = `Bạn đã tháo chạy được quãng đường dài <b style="color:#ff9f43">${Math.floor(distanceTravelled)} mét</b> và đạt tổng số <b style="color:#ff9f43">${score} điểm</b> trước khi bị xe bắt!`;
        startBtn.textContent = '🔄 CHƠI LẠI NGAY';
        menuScreen.style.display = 'flex';
    }

    // --- BẮT ĐẦU SỰ KIỆN ĐIỀU KHIỂN ---
    window.addEventListener('keydown', e => { keys[e.key] = true; });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    window.addEventListener('touchstart', e => {
        if (!gameActive) return;
        touchStartX = e.touches[0].clientX;
    }, { passive: true });

    window.addEventListener('touchmove', e => {
        if (!gameActive || !player) return;
        let touchX = e.touches[0].clientX;
        let diffX = touchX - touchStartX;
        player.x += diffX * 0.5;
        touchStartX = touchX;
    }, { passive: true });

    window.addEventListener('pointerdown', e => {
        if (!gameActive || !player) return;
        if (e.target.className === 'btn') return;
        let clickPercent = e.clientX / window.innerWidth;
        if (clickPercent < 0.4) player.x -= 22;
        else if (clickPercent > 0.6) player.x += 22;
    });

    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
